version: "3.8"

# =============================================================================
# Docker Compose — STT + TTS + LLM on single GPU host
# =============================================================================
# Build context: src/
#   docker compose -f docker-compose.gpu.yml build
#   docker compose -f docker-compose.gpu.yml up -d
# =============================================================================

services:
  stt:
    build:
      context: .
      dockerfile: stt/Dockerfile.parakeet
    ports:
      - "50060:50060"
    environment:
      - STT_PROVIDER=parakeet
      - STT_LANGUAGE=pt
      - PARAKEET_MODEL=nvidia/parakeet-tdt-0.6b-v2
      - PARAKEET_DEVICE=cuda:0
      - LOG_LEVEL=INFO
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import grpc; ch=grpc.insecure_channel('localhost:50060'); grpc.channel_ready_future(ch).result(timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

  tts:
    build:
      context: .
      dockerfile: tts/Dockerfile.kokoro-gpu
    ports:
      - "50070:50070"
    environment:
      - TTS_PROVIDER=kokoro
      - TTS_LANGUAGE=pt
      - KOKORO_VOICE=pf_dora
      - KOKORO_SPEED=1.0
      - KOKORO_LANG=pt-br
      - ONNX_PROVIDER=CUDAExecutionProvider
      - LOG_LEVEL=INFO
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import grpc; ch=grpc.insecure_channel('localhost:50070'); grpc.channel_ready_future(ch).result(timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  llm:
    build:
      context: .
      dockerfile: llm/Dockerfile.qwen
    ports:
      - "50080:50080"
    environment:
      - LLM_BACKEND_PROVIDER=vllm
      - VLLM_BASE_URL=http://localhost:8000/v1
      - LLM_MODEL=Qwen/Qwen2.5-7B-Instruct-AWQ
      - GRPC_PORT=50080
      - LOG_LEVEL=INFO
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import grpc; ch=grpc.insecure_channel('localhost:50080'); grpc.channel_ready_future(ch).result(timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
